  document.getElementById('dropHint').classList.remove('dragover')
  var items = e.dataTransfer.items
  if (items && items.length > 0) {
    var entry = items[0].webkitGetAsEntry ? items[0].webkitGetAsEntry() : null
    if (entry && entry.isDirectory) {
      // 拖入的是文件夹
      handleFolder(entry)
    } else if (items[0].getAsFile) {
      var f = items[0].getAsFile()
      if (f && isMdFile(f.name)) {
        var reader = new FileReader()
        reader.onload = function(ev) {
          var exists = state.files.some(function(sf) { return sf.path === f.name })
          if (!exists) {
            state.files.push({path: f.name, name: f.name, content: ev.target.result, type: 'md'})
          }
          refreshTree()
          openFile(f.name)
          saveState()
          persistToIndexedDB()
        }
        reader.readAsText(f)
      }
    }
  }
})

// ═══════════════════════════════════════════════════════════
// Markdown 解析
// ═══════════════════════════════════════════════════════════
function escHtml(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

// 解析 markdown 中的图片路径，返回 dataURL 或原始路径
function resolveImageSrc(src, filePath, imageMap) {
  if (!src || !imageMap) return src
  // 外部 URL 或绝对路径不做解析
  if (/^https?:\/\//.test(src) || src.charAt(0) === '/') return src
  // 1. 直接命中
  if (imageMap[src]) return imageMap[src]
  // 2. 相对于当前文件目录
  var dir = filePath ? filePath.substring(0, filePath.lastIndexOf('/')) : ''
  if (dir) {
    var fullPath = dir + '/' + src
    if (imageMap[fullPath]) return imageMap[fullPath]
  }
  // 3. 文件名回退 — 在 _imageDirIndex 中查找同名文件
  if (state._imageDirIndex) {
    var baseName = src.substring(src.lastIndexOf('/') + 1)
    if (baseName && state._imageDirIndex[baseName]) return state._imageDirIndex[baseName]
  }
  // 4. 回退原样
  return src
}

function parseMd(md) {
  if (!md) return {html: '', toc: []}
  md = md.replace(/\r\n/g,'\n').replace(/\r/g,'\n')
  var codeBlocks = []
  md = md.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) { codeBlocks.push({lang:lang||'text',code:code}); return '\n%%CB'+(codeBlocks.length-1)+'%%\n' })
  var inlineCodes = []
  md = md.replace(/`([^`\n]+)`/g, function(_, code) { inlineCodes.push(code); return '%%IC'+(inlineCodes.length-1)+'%%' })

  // 还原行内代码的辅助函数（slugify 等场景需要）
  function restoreInlineCodes(text) {
    return text.replace(/%%IC(\d+)%%/g, function(_, i) { return inlineCodes[+i] || '' })
  }

  // 生成标题 slug（兼容中文、英文、特殊字符）
  var slugCount = {}
  function slugify(text) {
    var s = restoreInlineCodes(text).replace(/<[^>]*>/g,'').replace(/[^\w一-鿿぀-ゟ゠-ヿ-]/g, '-').replace(/-+/g,'-').replace(/^-|-$/g,'').toLowerCase()
    if (!s) s = 'section'
    slugCount[s] = (slugCount[s] || 0) + 1
    return slugCount[s] > 1 ? s + '-' + slugCount[s] : s
  }

  var lines = md.split('\n'), html = '', toc = []
  var inTable = false, tableRows = [], inList = false, listType = '', inBq = false, bqLines = []

  function flushTable() {
    if (!inTable) return
    if (tableRows.length >= 2) {
      html += '<table><thead><tr>'
      tableRows[0].forEach(function(c) { html += '<th>'+inline(c)+'</th>' })
      html += '</tr></thead><tbody>'
      for (var r=2;r<tableRows.length;r++) { html += '<tr>'; tableRows[r].forEach(function(c) { html += '<td>'+inline(c)+'</td>' }); html += '</tr>' }
      html += '</tbody></table>'
    }
    inTable=false; tableRows=[]
  }
  function flushList() { if(inList){html+=listType==='ol'?'</ol>':'</ul>';inList=false} }
  function flushBq() { if(inBq){html+='<blockquote>'+bqLines.join('')+'</blockquote>';inBq=false;bqLines=[]} }
  function flushAll() { flushTable(); flushList(); flushBq() }
  function inline(text) {
    text = text.replace(/%%CB(\d+)%%/g, function(_,i) {
      var b=codeBlocks[+i]; var esc=escHtml(b.code)
      var langClass = b.lang && b.lang !== 'text' ? ' class="language-'+b.lang+'"' : ''
      return '<div class="code-block"><div class="code-header"><span class="code-lang">'+b.lang+'</span><button class="copy-btn" onclick="copyCode(this)">复制</button></div><pre class="line-numbers"><code'+langClass+'>'+esc+'</code></pre></div>'
    })
    text = text.replace(/%%IC(\d+)%%/g, function(_,i) { return inlineCodes[+i] != null ? '<code>'+escHtml(inlineCodes[+i])+'</code>' : '' })
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>')
    text = text.replace(/~~(.+?)~~/g, '<del>$1</del>')
    text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function(_, alt, src) {
      var resolved = resolveImageSrc(src, state.currentFile ? state.currentFile.path : '', state._imageMap)
      var isDataUrl = resolved.indexOf('data:') === 0
      var onerror = isDataUrl ? '' : ' onerror="this.style.display=\'none\';this.insertAdjacentHTML(\'afterend\',\'<span style=\\\'color:var(--text-muted);font-size:12px;padding:8px 12px;background:var(--bg-card);border:1px dashed var(--border);border-radius:6px;display:inline-block\\\'>🖼 图片未找到: \' + this.alt + \'</span>\');this.onerror=null"'
      return '<img src="' + resolved + '" alt="' + alt + '" loading="lazy"' + onerror + '>'
    })
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_, text, href) {
      var target = href.startsWith('#') ? '' : ' target="_blank"'
      return '<a href="' + href + '"' + target + '>' + text + '</a>'
    })
    return text
  }

  for (var i=0;i<lines.length;i++) {
    var line = lines[i]
    if (line.trim()==='') { flushAll(); continue }
    var cbM = line.trim().match(/^%%CB(\d+)%%$/)
    if (cbM) { flushAll(); var b=codeBlocks[+cbM[1]]; var esc=escHtml(b.code); var lc=b.lang&&b.lang!=='text'?' class="language-'+b.lang+'"':''; html+='<div class="code-block"><div class="code-header"><span class="code-lang">'+b.lang+'</span><button class="copy-btn" onclick="copyCode(this)">复制</button></div><pre class="line-numbers"><code'+lc+'>'+esc+'</code></pre></div>'; continue }
    if (/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line.trim())) { flushAll(); html+='<hr>'; continue }
    var hM = line.match(/^(#{1,6})\s+(.+)$/)
    if (hM) {
      flushAll()
      var level = hM[1].length
      var text = hM[2].trim()
      var id = slugify(text)
      toc.push({level: level, text: restoreInlineCodes(text.replace(/<[^>]*>/g,'')), id: id})
      html += '<h'+level+' id="'+id+'">'+inline(text)+'</h'+level+'>'
      continue
    }
    if (line.trim().indexOf('|')===0) {
      var cells = line.trim().replace(/^\||\|$/g,'').split('|').map(function(c){return c.trim()})
      if (cells.every(function(c){return /^[-:]+$/.test(c)})) { if(inTable&&tableRows.length===1)tableRows.push(cells); continue }
      if (!inTable) { flushList(); flushBq(); inTable=true }
      tableRows.push(cells); continue
    } else { flushTable() }
    var bqM = line.match(/^>\s?(.*)/)
    if (bqM) { flushList(); if(!inBq){inBq=true;bqLines=[]}; bqLines.push(inline(bqM[1])); continue } else { flushBq() }
    // task list
    var taskM = line.match(/^[-*+]\s+\[([ xX])\]\s+(.+)/)
    if (taskM) {
      flushBq(); if(!inList||listType!=='ul'){flushList();html+='<ul class="task-list">';inList=true;listType='ul'}
      html += '<li class="task-item"><label><input type="checkbox"'+(taskM[1]!==' '?' checked':'')+' disabled><span>'+inline(taskM[2])+'</span></label></li>'
      continue
    }
    var olM = line.match(/^(\d+)\.\s+(.+)/)
    if (olM) { flushBq(); if(!inList||listType!=='ol'){flushList();html+='<ol>';inList=true;listType='ol'};html+='<li>'+inline(olM[2])+'</li>'; continue }
    var ulM = line.match(/^[-*+]\s+(.+)/)
    if (ulM) { flushBq(); if(!inList||listType!=='ul'){flushList();html+='<ul>';inList=true;listType='ul'};html+='<li>'+inline(ulM[1])+'</li>'; continue }
    flushAll(); if(line.trim()) html+='<p>'+inline(line)+'</p>'
  }
  flushAll()
  return {html: html, toc: toc}
}

// ═══════════════════════════════════════════════════════════
// 打开文件
// ═══════════════════════════════════════════════════════════
function openFile(path) {
  var file = state.files.filter(function(f) { return f.path === path })[0]
  if (!file) return
  state.currentFile = file
  // 高亮 tree
  document.querySelectorAll('.tree-item').forEach(function(el) { el.classList.remove('active') })
  var treeEl = document.querySelector('.tree-item[data-path="' + path.replace(/"/g,'\\"') + '"]')
  if (treeEl) treeEl.classList.add('active')

  var contentEl = document.getElementById('content')
  document.getElementById('fileName').textContent = file.name
  var wordCount = file.content.length
  var readTime = Math.max(1, Math.round(wordCount / 500))
  var isMd = /\.(md|markdown)$/i.test(file.name)

  var closeBtn = '<button class="doc-close" onclick="closeFile()" title="关闭文件">✕</button>'
  var editBtn = '<button class="doc-edit" onclick="enterEditMode()" title="编辑 (Ctrl+E)">✎</button>'
  var result, html
  if (file.type === 'image') {
    // 图片文件：显示预览
    result = {toc: []}
    var imgSrc = state._imageMap && state._imageMap[path] ? state._imageMap[path] : ''
    html = '<div class="doc-header">' + closeBtn + '<h1>' + escHtml(file.name) + '</h1>' +
      '<div class="meta-info"><span>图片文件</span></div></div>' +
      '<div style="text-align:center;padding:20px"><img src="' + imgSrc + '" alt="' + escHtml(file.name) + '" style="max-width:100%;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.2)"></div>'
  } else if (isMd) {
    result = parseMd(file.content)
    html = '<div class="doc-header">' + closeBtn + editBtn + '<h1>' + escHtml(file.name.replace(/\.md$/i,'')) + '</h1>' +
      '<div class="meta-info"><span>' + wordCount + ' 字</span><span>约 ' + readTime + ' 分钟</span></div></div>' +
      result.html
  } else {
    var lang = getLangFromExt(file.name)
    result = {toc: []}
    html = '<div class="doc-header">' + closeBtn + editBtn + '<h1>' + escHtml(file.name) + '</h1>' +
      '<div class="meta-info"><span>' + wordCount + ' 字</span><span>' + lang.toUpperCase() + ' 文件</span></div></div>' +
      '<div class="code-block"><div class="code-header"><span class="code-lang">' + lang + '</span>' +
      '<button class="copy-btn" onclick="copyCode(this)">复制</button></div>' +
      '<pre class="line-numbers"><code class="language-' + lang + '">' + escHtml(file.content) + '</code></pre></div>'
  }

  // 缓存章节数用于进度计算
  if (!state._tocCache) state._tocCache = {}
  state._tocCache[path] = result.toc.filter(function(h) { return h.level <= 3 }).length
  contentEl.innerHTML = html

  // 构建进度
  buildProgress(result.toc)
  // 构建左侧 TOC
  buildToc(result.toc)
  // 更新 sidebar 高亮
  setupScrollSpy()
  // 语法高亮
  if (typeof Prism !== 'undefined') Prism.highlightAll()
  // 绑定锚点链接点击
  bindAnchorLinks()
  // 保存
  saveState()
}

// 关闭文件，回到拖拽区
function closeFile() {
  if (state._editing) { exitEditMode(false) }
  state.currentFile = null
  document.getElementById('fileName').textContent = '未加载'
  document.querySelectorAll('.tree-item').forEach(function(el) { el.classList.remove('active') })
  var contentEl = document.getElementById('content')
  contentEl.innerHTML = '<div class="drop-zone" id="dropZone">' +
    '<div class="hint" id="dropHint">' +
    '<div class="big-icon" style="font-size:48px;color:var(--accent);opacity:0.5">+</div>' +
    '<h2>拖入你的笔记</h2>' +
    '<p>支持拖拽整个文件夹或单个 .md 文件<br>也可以点击上方「导入」按钮选择文件夹</p>' +
    '</div>' +
    '<div id="historyList" style="width:100%;max-width:480px"></div>' +
    '</div>'
  renderHistoryList()
  // 清空进度面板
  document.getElementById('progressItems').innerHTML = ''
  document.getElementById('progressFill').style.width = '0%'
  document.getElementById('tocNav').innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px 18px">打开文件后显示</div>'
  saveState()
}

// ═══════════════════════════════════════════════════════════
// 编辑器
// ═══════════════════════════════════════════════════════════
var FORMAT_MAP = {
  bold:      {pre: '**', suf: '**',  placeholder: '粗体文字'},
  italic:    {pre: '*',  suf: '*',   placeholder: '斜体文字'},
  strike:    {pre: '~~', suf: '~~',  placeholder: '删除线文字'},
  code:      {pre: '`',  suf: '`',   placeholder: '代码'},
  codeblock: {pre: '```\n', suf: '\n```', placeholder: '代码块'},
  link:      {pre: '[', suf: '](https://)', placeholder: '链接文字'},
  image:     {pre: '![', suf: '](https://)', placeholder: '图片描述'},
  ul:        {pre: '- ', suf: '', placeholder: '列表项'},
  ol:        {pre: '1. ', suf: '', placeholder: '列表项'},
  quote:     {pre: '> ', suf: '', placeholder: '引用内容'}
}

function enterEditMode() {
  if (!state.currentFile) return
  state._editing = true
  state._editOriginal = state.currentFile.content
  var file = state.currentFile
  var contentEl = document.getElementById('content')

  var toolbar = '<div class="editor-toolbar">' +
    '<button onclick="formatEdit(\'bold\')" title="加粗"><b>B</b></button>' +
    '<button onclick="formatEdit(\'italic\')" title="斜体"><i>I</i></button>' +
    '<button onclick="formatEdit(\'strike\')" title="删除线"><s>S</s></button>' +
    '<button onclick="formatEdit(\'code\')" title="行内代码">&lt;/&gt;</button>' +
    '<button onclick="formatEdit(\'codeblock\')" title="代码块">{ }</button>' +
    '<button onclick="formatEdit(\'link\')" title="链接">🔗</button>' +
    '<button onclick="formatEdit(\'image\')" title="图片">🖼</button>' +
    '<button onclick="formatEdit(\'ul\')" title="无序列表">• List</button>' +
    '<button onclick="formatEdit(\'ol\')" title="有序列表">1. List</button>' +
    '<button onclick="formatEdit(\'quote\')" title="引用">❝</button>' +
    '</div>'

  var editor = '<div class="editor-container">' +
    '<textarea class="editor-textarea" id="editorTextarea" spellcheck="false">' +
    escHtml(file.content) +
    '</textarea></div>'

  var actions = '<div class="editor-actions">' +
    '<button class="share-btn" onclick="exitEditMode(false)">取消</button>' +
    '<button class="share-btn primary" onclick="saveEdit()">💾 保存</button>' +
    '</div>'

  contentEl.innerHTML = '<div class="doc-header">' +
    '<button class="doc-close" onclick="exitEditMode(false)" title="取消编辑">✕</button>' +
    '<h1>编辑: ' + escHtml(file.name) + '</h1></div>' +
    toolbar + editor + actions

  var textarea = document.getElementById('editorTextarea')
  textarea.focus()

  // Tab 键插入制表符
  textarea.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault()
      var start = this.selectionStart
      var end = this.selectionEnd
      if (e.shiftKey) {
        // Shift+Tab: 减少缩进
        var lineStart = this.value.lastIndexOf('\n', start - 1) + 1
        if (this.value.substring(lineStart, lineStart + 1) === '\t') {
          this.value = this.value.substring(0, lineStart) + this.value.substring(lineStart + 1)
          this.selectionStart = this.selectionEnd = start - 1
        }
      } else {
        this.value = this.value.substring(0, start) + '\t' + this.value.substring(end)
        this.selectionStart = this.selectionEnd = start + 1
      }
    }
  })

  // Ctrl+S 保存
  textarea.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault()
      saveEdit()
    }
  })

  // Esc 退出
  textarea.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      exitEditMode(false)
    }
  })
}

function saveEdit() {
  if (!state._editing || !state.currentFile) return
  var textarea = document.getElementById('editorTextarea')
  if (!textarea) return
  var newContent = textarea.value

  // 更新 state.files 中的文件内容
  for (var i = 0; i < state.files.length; i++) {
    if (state.files[i].path === state.currentFile.path) {
      state.files[i].content = newContent
      break
    }
  }
  state._editing = false
  state._editOriginal = null
  saveState()
  // 重新渲染
  openFile(state.currentFile.path)
  showToast('已保存', 'var(--green)')
}

function exitEditMode(force) {
  if (!state._editing) return
  var textarea = document.getElementById('editorTextarea')
  if (!force && textarea && textarea.value !== state._editOriginal) {
    showConfirm('有未保存的修改，确定放弃？', function() {
      state._editing = false
      state._editOriginal = null
      if (state.currentFile) { openFile(state.currentFile.path) }
    })
    return
  }
  state._editing = false
  state._editOriginal = null
  if (state.currentFile) {
    openFile(state.currentFile.path)
  }
}

function formatEdit(type) {
  var textarea = document.getElementById('editorTextarea')
  if (!textarea) return
  var fmt = FORMAT_MAP[type]
  if (!fmt) return
  var start = textarea.selectionStart
  var end = textarea.selectionEnd
  var selected = textarea.value.substring(start, end)
  var insert = selected || fmt.placeholder
  textarea.value = textarea.value.substring(0, start) + fmt.pre + insert + fmt.suf + textarea.value.substring(end)
  textarea.selectionStart = start + fmt.pre.length
  textarea.selectionEnd = start + fmt.pre.length + insert.length
  textarea.focus()
}

// Ctrl+E 全局快捷键进入编辑
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'e') {
    e.preventDefault()
    if (state._editing) {
      saveEdit()
    } else if (state.currentFile) {
      enterEditMode()
    }
  }
})

function bindAnchorLinks() {
  document.querySelectorAll('#content a[href^="#"]').forEach(function(a) {
    a.addEventListener('click', function(e) {
      e.preventDefault()
      var raw = decodeURIComponent(this.getAttribute('href').substring(1))
      // 1. 精确匹配
      var target = document.getElementById(raw)
      // 2. slug 化匹配（处理用户写 #标题 但 id 是 slug 的情况）
      if (!target) {
        var slug = raw.replace(/[^\w一-鿿-鿿぀-ゟ゠-ヿ-]/g, '-').replace(/-+/g,'-').replace(/^-|-$/g,'').toLowerCase()
        target = document.getElementById(slug)
      }
      // 3. 模糊匹配：去掉所有非中文非字母数字字符后比较
      if (!target) {
        var norm = raw.replace(/[^一-鿿豈-﫿぀-ゟ゠-ヿ\w]/g, '').toLowerCase()
        document.querySelectorAll('#content [id]').forEach(function(el) {
          var elNorm = el.id.replace(/[^一-鿿豈-﫿぀-ゟ゠-ヿ\w]/g, '').toLowerCase()
          if (elNorm === norm) target = el
        })
      }
      if (target) {
        target.scrollIntoView({behavior: 'smooth', block: 'start'})
        try { history.replaceState(null, '', '#' + target.id) } catch(e) {}
      }
    })
  })
}

// ═══════════════════════════════════════════════════════════
// 进度
// ═══════════════════════════════════════════════════════════
function buildToc(toc) {
  var container = document.getElementById('tocNav')
  if (!toc || toc.length === 0) { container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px 18px">没有章节标题</div>'; return }
  var html = ''
  toc.forEach(function(h) {
    if (h.level > 3) return
    html += '<div class="tree-item" data-toc-id="' + h.id + '" style="padding-left:' + (h.level === 2 ? 18 : 34) + 'px;font-size:' + (h.level === 2 ? '13px' : '12px') + '">'
    html += '<span class="icon">' + (h.level === 2 ? '#' : '·') + '</span><span class="name">' + escHtml(h.text) + '</span>'
    html += '</div>'
  })
  container.innerHTML = html
  container.querySelectorAll('[data-toc-id]').forEach(function(el) {
    el.addEventListener('click', function() {
      var id = this.getAttribute('data-toc-id')
      document.getElementById(id).scrollIntoView({behavior:'smooth'})
    })
  })
}

function buildProgress(toc) {
  var container = document.getElementById('progressItems')
  if (!toc || toc.length === 0) { container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px 0">本文没有章节标题</div>'; return }
  var html = ''
  var filePath = state.currentFile ? state.currentFile.path : ''
  var prog = state.progress[filePath] || {}
  toc.forEach(function(h) {
    if (h.level > 3) return
    var checked = prog[h.id] ? 'checked' : ''
    html += '<div class="progress-item" onclick="toggleProgress(\''+h.id+'\')" style="padding-left:'+(h.level===2?4:20)+'px">'
    html += '<input type="checkbox" '+checked+' id="cb-'+h.id+'">'
    html += '<span>' + h.text.substring(0,30) + '</span>'
    html += '</div>'
  })
  container.innerHTML = html
  updateProgressBar()
}

function toggleProgress(id) {
  var filePath = state.currentFile ? state.currentFile.path : ''
  if (!state.progress[filePath]) state.progress[filePath] = {}
  state.progress[filePath][id] = !state.progress[filePath][id]
  if (!state.progress[filePath][id]) delete state.progress[filePath][id]
  localStorage.setItem('md-progress', JSON.stringify(state.progress))
  var cb = document.getElementById('cb-'+id)
  if (cb) cb.checked = !cb.checked
  updateProgressBar()
  // 更新 tree 上的进度点
  refreshTree()
}

function updateProgressBar() {
  var filePath = state.currentFile ? state.currentFile.path : ''
  var items = document.querySelectorAll('#progressItems .progress-item')
  var checked = document.querySelectorAll('#progressItems .progress-item input:checked')
  var pct = items.length > 0 ? Math.round(checked.length / items.length * 100) : 0
  document.getElementById('progressFill').style.width = pct + '%'
}

function importProgress(e) {
  var file = e.target.files[0]
  if (!file) return
  var reader = new FileReader()
  reader.onload = function(ev) {
    try {
      var imported = JSON.parse(ev.target.result)
      // 合并而非覆盖
      Object.keys(imported).forEach(function(filePath) {
        if (!state.progress[filePath]) state.progress[filePath] = {}
        Object.keys(imported[filePath]).forEach(function(tocId) {
          state.progress[filePath][tocId] = imported[filePath][tocId]
        })
      })
      localStorage.setItem('md-progress', JSON.stringify(state.progress))
      if (state.currentFile) openFile(state.currentFile.path)
      refreshTree()
      getTodayReviews()
      showAlert('导入成功！')
    } catch(err) { showAlert('导入失败：文件格式错误') }
  }
  reader.readAsText(file)
  e.target.value = ''
}

function toggleProgressWithReview(id) {
  var filePath = state.currentFile ? state.currentFile.path : ''
  if (!state.progress[filePath]) state.progress[filePath] = {}
  var current = state.progress[filePath][id]
  if (!current) {
    // 标记完成，设置复习时间（1天后）
    state.progress[filePath][id] = {done: true, reviewAt: Date.now() + 86400000}
  } else if (current === true) {
    // 旧格式兼容：转为新格式
    state.progress[filePath][id] = {done: true, reviewAt: Date.now() + 86400000}
  } else if (current.done) {
    // 已完成，取消
    delete state.progress[filePath][id]
  }
  localStorage.setItem('md-progress', JSON.stringify(state.progress))
  buildProgress(state.currentFile ? parseMd(state.currentFile.content).toc : [])
  refreshTree()
  getTodayReviews()
}

function getTodayReviews() {
  var now = Date.now()
  var reviews = []
  Object.keys(state.progress).forEach(function(filePath) {
    var fileProg = state.progress[filePath]
    var file = state.files.filter(function(f){ return f.path === filePath })[0]
    var titleMap = {}
    if (file && file.content) {
      var result = parseMd(file.content)
      result.toc.forEach(function(h) { titleMap[h.id] = h.text })
    }
    Object.keys(fileProg).forEach(function(tocId) {
      var val = fileProg[tocId]
      if (val && typeof val === 'object' && val.done && val.reviewAt && val.reviewAt <= now) {
        reviews.push({file: filePath, tocId: tocId, title: titleMap[tocId] || tocId})
      }
    })
  })
  var container = document.getElementById('reviewList')
  if (reviews.length === 0) {
    container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:8px 18px">暂无待复习内容</div>'
    return
  }
  var html = ''
  reviews.forEach(function(r) {
    html += '<div class="tree-item" onclick="openFile(\'' + r.file.replace(/'/g,"\\'") + '\')" style="font-size:12px">'
    html += '<span class="icon icon-note" style="display:inline-block;position:relative"></span><span class="name">' + escHtml(r.file.split('/').pop()) + ' · ' + escHtml(r.title.substring(0,20)) + '</span>'
    html += '</div>'
  })
  container.innerHTML = html
}

// 搜索
// ═══════════════════════════════════════════════════════════
var searchTimer = null
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer)
  searchTimer = setTimeout(doSearch, 300)
})

function parseSearchQuery(input) {
  var q = input.trim()
  // 正则模式: /pattern/flags
  var regexMatch = q.match(/^\/(.+)\/([gimsuy]*)$/)
  if (regexMatch) {
    try { return { type: 'regex', regex: new RegExp(regexMatch[1], regexMatch[2] || 'gi'), display: regexMatch[1] } }
    catch(e) { /* 无效正则，回退 */ }
  }
  // 多关键词: 空格分隔 AND
  var keywords = q.split(/\s+/).filter(function(k){ return k.length > 0 })
  if (keywords.length > 1) return { type: 'multi', keywords: keywords, display: q }
  // 单关键词
  return { type: 'simple', keyword: q.toLowerCase(), display: q }
}

function doSearch() {
  var raw = document.getElementById('searchInput').value
  var query = parseSearchQuery(raw)
  state.searchQuery = raw.trim()
  var panel = document.getElementById('searchPanel')
  if (!raw.trim() || state.files.length === 0) { panel.classList.remove('open'); return }

  var results = []
  state.files.forEach(function(f) {
    if (f.type !== 'md' || !f.content) return
    var lines = f.content.split('\n')
    lines.forEach(function(line, i) {
      var matched = false
      if (query.type === 'regex') { query.regex.lastIndex = 0; matched = query.regex.test(line) }
      else if (query.type === 'multi') { var lower = line.toLowerCase(); matched = query.keywords.every(function(k){ return lower.indexOf(k.toLowerCase()) !== -1 }) }
      else { matched = line.toLowerCase().indexOf(query.keyword) !== -1 }
      if (matched) {
        var ctx_before = i > 0 ? lines[i-1].trim().substring(0, 80) : ''
        var ctx_after = i < lines.length - 1 ? lines[i+1].trim().substring(0, 80) : ''
        results.push({file: f.path, line: i + 1, text: line.trim().substring(0, 120), ctxBefore: ctx_before, ctxAfter: ctx_after})
      }
    })
  })

  if (results.length === 0) {
    panel.innerHTML = '<div class="result-count">未找到匹配</div>'
    panel.classList.add('open')
    return
  }

  var html = '<div class="result-count">找到 ' + results.length + ' 处匹配</div>'
  results.slice(0, 30).forEach(function(r) {
    var highlighted = r.text
    if (query.type === 'regex') highlighted = r.text.replace(query.regex, '<mark>$&</mark>')
    else if (query.type === 'multi') query.keywords.forEach(function(k){ highlighted = highlighted.replace(new RegExp('(' + k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'), '<mark>$1</mark>') })
    else highlighted = r.text.replace(new RegExp('(' + query.display.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi'), '<mark>$1</mark>')
    html += '<div class="result-item" onclick="jumpToResult(\'' + r.file.replace(/'/g, "\\'") + '\',' + r.line + ')">'
    html += '<div class="file-path">' + escHtml(r.file) + ':' + r.line + '</div>'
    if (r.ctxBefore) html += '<div class="ctx-line" style="color:var(--text-muted);font-size:11px;opacity:.6">↑ ' + escHtml(r.ctxBefore) + '</div>'
    html += '<div class="match-text">' + highlighted + '</div>'
    if (r.ctxAfter) html += '<div class="ctx-line" style="color:var(--text-muted);font-size:11px;opacity:.6">↓ ' + escHtml(r.ctxAfter) + '</div>'
    html += '</div>'
  })
  panel.innerHTML = html
  panel.classList.add('open')
}

function jumpToResult(path, line) {
  openFile(path)
  document.getElementById('searchPanel').classList.remove('open')
  // 高亮匹配行
  setTimeout(function() {
    var els = document.querySelectorAll('#content h2, #content h3, #content p, #content li')
    var target = els[Math.min(line, els.length) - 1]
    if (target) target.scrollIntoView({behavior:'smooth', block:'center'})
  }, 100)
}

// IndexedDB 多标签页并发写入保护：用 BroadcastChannel 通知其他标签页刷新
;(function() {
  if (!window.BroadcastChannel) return
  var bc = new BroadcastChannel('inknote-sync')
  bc.onmessage = function(e) {
    if (e.data && e.data.type === 'db-changed') {
      // 其他标签页修改了 IndexedDB，刷新当前页数据
      if (typeof StorageCore !== 'undefined') {
        StorageCore.getLatest().then(function(folder) {
          if (!folder) return
          // 只有当前没有打开文件时才自动恢复
          if (!state.currentFile && folder.files && folder.files.length > 0) {
            state.files = folder.files
            state._folderId = folder.id
            state._folderName = folder.name
            refreshTree()
            var firstMd = state.files.filter(function(f) { return f.type === 'md' })[0]
            if (firstMd) openFile(firstMd.path)
          }
        })
      }
    }
  }
  // 在 persistToIndexedDB 成功后通知其他标签页
  var origPersist = window.persistToIndexedDB
  if (origPersist) {
    window.persistToIndexedDB = function() {
      origPersist()
      try { bc.postMessage({type: 'db-changed'}) } catch(e) {}
    }
  }
})()

// 涟漪效果
function addRipple(el, e) {
  var rect = el.getBoundingClientRect()
  var ripple = document.createElement('span')
  ripple.className = 'ripple'
  var size = Math.max(rect.width, rect.height)
  ripple.style.width = ripple.style.height = size + 'px'
  ripple.style.left = (e.clientX - rect.left - size/2) + 'px'
  ripple.style.top = (e.clientY - rect.top - size/2) + 'px'
  el.appendChild(ripple)
  setTimeout(function() { ripple.remove() }, 600)
}

})

// Toast 提示
function showToast(msg, color) {
  var existing = document.querySelector('.toast')
  if (existing) existing.remove()
  var toast = document.createElement('div')
  toast.className = 'toast'
  toast.textContent = msg
  if (color) toast.style.background = color
  document.body.appendChild(toast)
  requestAnimationFrame(function() { toast.classList.add('show') })
  setTimeout(function() {

// 自定义弹框（替代 confirm/alert）
function showModal(opts) {
  var overlay = document.getElementById('modalOverlay')
  var icon = document.getElementById('modalIcon')
  var title = document.getElementById('modalTitle')
  var msg = document.getElementById('modalMsg')
  var actions = document.getElementById('modalActions')

  icon.textContent = opts.icon || (opts.type === 'confirm' ? '⚠️' : 'ℹ️')
  title.textContent = opts.title || '提示'
  msg.textContent = opts.message || ''

  var html = ''
  if (opts.type === 'confirm') {
    html += '<button class="modal-btn cancel" id="modalCancel">取消</button>'
    html += '<button class="modal-btn ' + (opts.confirmClass || 'confirm') + '" id="modalConfirm">确定</button>'
  } else {
    html += '<button class="modal-btn ' + (opts.confirmClass || 'success') + '" id="modalConfirm">确定</button>'
  }
  actions.innerHTML = html

  overlay.classList.add('show')

  var cleanup = []
  function close() {
    overlay.classList.remove('show')
    // 清理所有事件监听器，防止累积
    cleanup.forEach(function(fn) { fn() })
    cleanup = []
  }

  var confirmBtn = document.getElementById('modalConfirm')
  function onConfirm() { close(); if (opts.onConfirm) opts.onConfirm() }
  confirmBtn.addEventListener('click', onConfirm)
  cleanup.push(function() { confirmBtn.removeEventListener('click', onConfirm) })

  if (opts.type === 'confirm') {
    var cancelBtn = document.getElementById('modalCancel')
    function onCancel() { close(); if (opts.onCancel) opts.onCancel() }
    cancelBtn.addEventListener('click', onCancel)
    cleanup.push(function() { cancelBtn.removeEventListener('click', onCancel) })
  }
  // 点击遮罩关闭
  function onOverlay(e) {
    if (e.target === overlay) {
      close()
      if (opts.type === 'confirm' && opts.onCancel) opts.onCancel()
    }
  }
  overlay.addEventListener('click', onOverlay)
  cleanup.push(function() { overlay.removeEventListener('click', onOverlay) })
}

function showConfirm(message, onConfirm, onCancel) {
  showModal({type: 'confirm', message: message, onConfirm: onConfirm, onCancel: onCancel})
}

function showAlert(message, onClose) {
  showModal({type: 'alert', message: message, onConfirm: onClose})
}

// ═══════════════════════════════════════════════════════════
// 分享核心逻辑（纯函数，可测试）
// ═══════════════════════════════════════════════════════════
window.ShareCore = {
  // 生成房间号：md-xxxxxx（6位字母数字）
  genId: function() {
    return 'md-' + Math.random().toString(36).substring(2, 8)
  },

  // 序列化文件：只保留 path/name/content，排除 isDemo 演示文件
  serializeFiles: function(files) {
    return files
      .filter(function(f) { return f.type === 'md' && f.content && !f.isDemo })
      .map(function(f) { return {path: f.path, name: f.name, content: f.content} })
  },

  // 合并接收到的文件到现有列表，返回新增数量
  mergeReceivedFiles: function(existing, received) {
    var added = 0
    received.forEach(function(f) {
      if (!f.path || !f.name) return
      var found = false
      for (var i = 0; i < existing.length; i++) {
        if (existing[i].path === f.path) {
          existing[i].content = f.content
          found = true
          break
        }
      }
      if (!found) {
        existing.push({path: f.path, name: f.name, content: f.content, type: 'md'})
        added++
      }
    })
    return added
  },

  // 解析接收到的消息，返回 {type, files?, file?, from?} 或 null
  parseMessage: function(raw) {
    try {
      var data = JSON.parse(raw)
      if (data.type === 'files' && Array.isArray(data.files)) {
        return {type: 'files', files: data.files, from: data.from || 'unknown'}
      }
      if (data.type === 'file' && data.file && data.file.path) {
        return {type: 'file', file: data.file, from: data.from || 'unknown'}
      }
      return null
    } catch(e) {
      return null
    }
  },

  // 验证单个文件数据完整性
  isValidFile: function(f) {
    return f && typeof f.path === 'string' && f.path.length > 0 &&
           typeof f.name === 'string' && f.name.length > 0 &&
           typeof f.content === 'string'
  }
}

// ═══════════════════════════════════════════════════════════
// IndexedDB 持久化存储（纯函数，可测试）
// ═══════════════════════════════════════════════════════════
window.StorageCore = {
  DB_NAME: 'inknote-db',
  DB_VERSION: 1,
  STORE_NAME: 'folders',

  // 打开数据库，返回 Promise<IDBDatabase>
  openDB: function() {
    var self = this
    return new Promise(function(resolve, reject) {
      if (!window.indexedDB) {
        reject(new Error('IndexedDB 不可用'))
        return
      }
      var req = indexedDB.open(self.DB_NAME, self.DB_VERSION)
      req.onupgradeneeded = function(e) {
        var db = e.target.result
        if (!db.objectStoreNames.contains(self.STORE_NAME)) {
          db.createObjectStore(self.STORE_NAME, {keyPath: 'id'})
        }
      }
      req.onsuccess = function(e) { resolve(e.target.result) }
      req.onerror = function(e) { reject(e.target.error) }
    })
  },

  // 保存文件夹，返回 Promise<void>
  saveFolder: function(folder) {
    var self = this
    return self.openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction(self.STORE_NAME, 'readwrite')
        var store = tx.objectStore(self.STORE_NAME)
        store.put(folder)
        tx.oncomplete = function() { resolve() }
        tx.onerror = function(e) { reject(e.target.error) }
      })
    })
  },

  // 加载所有文件夹，返回 Promise<Array>
  loadFolders: function() {
    var self = this
    return self.openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction(self.STORE_NAME, 'readonly')
        var store = tx.objectStore(self.STORE_NAME)
        var req = store.getAll()
        req.onsuccess = function(e) { resolve(e.target.result || []) }
        req.onerror = function(e) { reject(e.target.error) }
      })
    })
  },

  // 删除文件夹，返回 Promise<void>
  deleteFolder: function(id) {
    var self = this
    return self.openDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction(self.STORE_NAME, 'readwrite')
        var store = tx.objectStore(self.STORE_NAME)
        store.delete(id)
        tx.oncomplete = function() { resolve() }
        tx.onerror = function(e) { reject(e.target.error) }
      })
    })
  },

  // 获取最近打开的文件夹，返回 Promise<Object|null>
  getLatest: function() {
    var self = this
    return self.loadFolders().then(function(folders) {
      if (folders.length > 0) {
        folders.sort(function(a, b) { return (b.lastOpen || 0) - (a.lastOpen || 0) })
        return folders[0]
      }
      // 迁移：尝试从旧库 md-study-helper 读取
      return self._migrateOldDB().then(function() {
        return self.loadFolders().then(function(folders2) {
          if (folders2.length === 0) return null
          folders2.sort(function(a, b) { return (b.lastOpen || 0) - (a.lastOpen || 0) })
          return folders2[0]
        })
      })
    })
  },
  _migrateOldDB: function() {
    var self = this
    return new Promise(function(resolve) {
      if (!window.indexedDB) { resolve(); return }
      var req = indexedDB.open('md-study-helper', 1)
      req.onerror = function() { resolve() }
      req.onsuccess = function(e) {
        var oldDb = e.target.result
        if (!oldDb.objectStoreNames.contains('folders')) { oldDb.close(); resolve(); return }
        var tx = oldDb.transaction('folders', 'readonly')
        var store = tx.objectStore('folders')
        var getAll = store.getAll()
        getAll.onsuccess = function(ev) {
          var oldFolders = ev.target.result || []
          oldDb.close()
          if (oldFolders.length === 0) { resolve(); return }
          // 写入新库
          Promise.all(oldFolders.map(function(f) { return self.saveFolder(f) })).then(function() {
            console.log('✅ 已从旧库迁移 ' + oldFolders.length + ' 个文件夹')
            resolve()
          }).catch(function() { resolve() })
        }
        getAll.onerror = function() { oldDb.close(); resolve() }
      }
    })
  },

  // 检查存储配额，返回 Promise<{usage, quota, percent}>
  checkQuota: function() {
    if (navigator.storage && navigator.storage.estimate) {
      return navigator.storage.estimate().then(function(est) {
        var usage = est.usage || 0
        var quota = est.quota || 0
        var percent = quota > 0 ? Math.round(usage / quota * 100) : 0
        return {usage: usage, quota: quota, percent: percent}
      })
    }
    return Promise.resolve({usage: 0, quota: 0, percent: 0})
  }
}

  })
})()

// ═══════════════════════════════════════════════════════════
// PeerJS 实时分享 — UI 层（依赖 ShareCore）
// ═══════════════════════════════════════════════════════════
;(function() {
  var SC = window.ShareCore
  var myPeer = null
  var myId = ''
  var conns = {} // peerId -> DataConnection
  var connAlive = {} // peerId -> timestamp (last pong)
  var heartbeatTimer = null

  function showShareStatus(msg, type) {
    var el = document.getElementById('shareStatus')
    el.textContent = msg
    el.className = 'share-status show ' + type
  }

  function hideShareStatus() {
    document.getElementById('shareStatus').className = 'share-status'
  }

  function updateConnectedUsers() {
    var section = document.getElementById('connectedSection')
    var container = document.getElementById('connectedUsers')
    var ids = Object.keys(conns)
    if (ids.length === 0) {
      section.style.display = 'none'
      document.getElementById('shareFileSection').style.display = 'none'
      document.getElementById('shareCurrentSection').style.display = 'none'
      return
    }
    section.style.display = 'block'
    document.getElementById('shareFileSection').style.display = 'block'
    document.getElementById('shareCurrentSection').style.display = 'block'
    var html = ''
    ids.forEach(function(id) {
      var alive = connAlive[id] ? Date.now() - connAlive[id] < 30000 : true
      var dotColor = alive ? 'var(--green)' : 'var(--text-muted)'
      html += '<span class="share-user-tag" style="gap:6px"><span style="width:6px;height:6px;border-radius:50%;background:' + dotColor + ';flex-shrink:0"></span>' + escHtml(id) + '<button class="share-disconnect-btn" data-peer="' + escHtml(id) + '" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:11px;padding:0 2px;line-height:1" title="断开">✕</button></span>'
    })
    html += '<button id="disconnectAllBtn" style="background:var(--red-soft);color:var(--red);border:1px solid rgba(240,96,112,.25);border-radius:12px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s" onmouseenter="this.style.background=\'var(--red)\';this.style.color=\'#fff\'" onmouseleave="this.style.background=\'var(--red-soft)\';this.style.color=\'var(--red)\'">断开全部</button>'
    container.innerHTML = html
    // 绑定断开按钮
    container.querySelectorAll('.share-disconnect-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation()
        disconnectPeer(this.getAttribute('data-peer'), '手动断开')
      })
    })
    var disconnectAllBtn = document.getElementById('disconnectAllBtn')
    if (disconnectAllBtn) {
      disconnectAllBtn.addEventListener('click', function() {
        showConfirm('确定断开所有连接？', function() { disconnectAll() })
      })
    }
    renderShareFileList()
  }

  function renderShareFileList() {
    var container = document.getElementById('shareFileList')
    var mdFiles = state.files.filter(function(f) { return f.type === 'md' })
    if (mdFiles.length === 0) {
      container.innerHTML = '<div style="padding:12px;color:var(--text-muted);font-size:12px;text-align:center">暂无文件</div>'
      return
    }
    var html = ''
    mdFiles.forEach(function(f, i) {
      html += '<label class="share-file-item"><input type="checkbox" class="share-file-cb" data-idx="' + i + '" data-path="' + escHtml(f.path) + '" checked><span class="sf-name">' + escHtml(f.name) + '</span></label>'
    })
    container.innerHTML = html
  }

  function getSelectedShareFiles() {
    // 读取 DOM checkbox 中勾选的路径
    var checkedPaths = {}
    document.querySelectorAll('.share-file-cb:checked').forEach(function(cb) {
      checkedPaths[cb.getAttribute('data-path')] = true
    })
    // 从 state.files 中按路径取实际文件数据（不依赖 DOM 缓存的内容）
    return SC.serializeFiles(state.files).filter(function(f) {
      return checkedPaths[f.path]
    })
  }

  function sendData(data) {
    var ids = Object.keys(conns)
    if (ids.length === 0) { showToast('没有已连接的用户', 'var(--orange)'); return }
    var json = JSON.stringify(data)
    ids.forEach(function(id) {
      try { conns[id].send(json) } catch(e) { console.warn('发送失败:', id, e) }
    })
    showToast('已发送给 ' + ids.length + ' 位用户', 'var(--green)')
  }

  function handleReceivedData(raw) {
    var msg = SC.parseMessage(raw)
    if (!msg) {
      // 尝试解析 ping/pong
      try {
        var data = JSON.parse(raw)
        if (data.type === 'ping') {
          // 回复 pong
          var ids = Object.keys(conns)
          ids.forEach(function(id) {
            try { conns[id].send(JSON.stringify({type: 'pong', from: myId})) } catch(e) {}
          })
          return
        }
        if (data.type === 'pong') {
          connAlive[data.from || 'unknown'] = Date.now()
          return
        }
      } catch(e) {}
      console.warn('收到无效数据:', raw)
      return
    }

    // 收到有效数据也更新活跃时间
    if (msg.from) connAlive[msg.from] = Date.now()

    if (msg.type === 'files') {
      // 记录已有文件路径，用于找到"新增"的文件
      var beforePaths = {}
      state.files.forEach(function(f) { beforePaths[f.path] = true })
      var added = SC.mergeReceivedFiles(state.files, msg.files)
      refreshTree()
      saveState()
      showToast('收到 ' + added + ' 个新文件（来自 ' + msg.from + '）', 'var(--accent)')
      // 自动打开第一个新增的文件（非 demo）
      if (added > 0) {
        var newFile = msg.files.filter(function(f) { return !beforePaths[f.path] })[0]
        if (newFile) openFile(newFile.path)
      }
    } else if (msg.type === 'file') {
      var existed = state.files.some(function(f) { return f.path === msg.file.path })
      SC.mergeReceivedFiles(state.files, [msg.file])
      refreshTree()
      saveState()
      if (existed) {
        showToast('文件已更新: ' + msg.file.name + '（来自 ' + msg.from + '）', 'var(--accent)')
      } else {
        showToast('收到新文件: ' + msg.file.name + '（来自 ' + msg.from + '）', 'var(--accent)')
      }
      openFile(msg.file.path)
    }
  }

  // 心跳检测：每 15 秒发 ping，30 秒无 pong 判定离线
  function startHeartbeat() {
    if (heartbeatTimer) clearInterval(heartbeatTimer)
    heartbeatTimer = setInterval(function() {
      var now = Date.now()
      var ids = Object.keys(conns)
      ids.forEach(function(id) {
        // 检查是否超时
        if (connAlive[id] && now - connAlive[id] > 30000) {
          disconnectPeer(id, '心跳超时')
          return
        }
        // 发送 ping
        try { conns[id].send(JSON.stringify({type: 'ping', from: myId})) } catch(e) {}
      })
    }, 15000)
  }

  function stopHeartbeat() {
    if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null }
  }

  // 断开单个连接
  function disconnectPeer(peerId, reason) {
    if (conns[peerId]) {
      try { conns[peerId].close() } catch(e) {}
      delete conns[peerId]
    }
    delete connAlive[peerId]
    updateConnectedUsers()
    showToast((reason ? reason + ': ' : '已断开: ') + peerId, 'var(--orange)')
  }

  // 断开全部连接
  function disconnectAll() {
    var ids = Object.keys(conns)
    ids.forEach(function(id) {
      try { conns[id].close() } catch(e) {}
      delete conns[id]
      delete connAlive[id]
    })
    stopHeartbeat()
    updateConnectedUsers()
    showShareStatus('已断开所有连接', 'info')
  }

  function initPeer(id) {
    if (myPeer) { myPeer.destroy() }
    myPeer = new Peer(id, {debug: 0})

    myPeer.on('open', function(pid) {
      myId = pid
      document.getElementById('myPeerId').textContent = pid
      hideShareStatus()
    })

    myPeer.on('connection', function(conn) {
      conn.on('open', function() {
        conns[conn.peer] = conn
        connAlive[conn.peer] = Date.now()
        showShareStatus('🟢 ' + conn.peer + ' 已连接', 'success')
        updateConnectedUsers()
        startHeartbeat()
      })
      conn.on('data', function(raw) { handleReceivedData(raw) })
      conn.on('close', function() {
        delete conns[conn.peer]
        updateConnectedUsers()
        showToast(conn.peer + ' 已断开', 'var(--orange)')
      })
      conn.on('error', function(err) {
        console.warn('连接错误:', conn.peer, err)
        delete conns[conn.peer]
        updateConnectedUsers()
      })
    })

    myPeer.on('error', function(err) {
      if (err.type === 'unavailable-id') {
        myId = SC.genId()
        initPeer(myId)
        return
      }
      showShareStatus('❌ PeerJS 错误: ' + err.type, 'error')
    })
  }

  // 打开分享面板
  document.getElementById('shareBtn').addEventListener('click', function() {
    document.getElementById('shareOverlay').classList.add('show')
    if (!myPeer || myPeer.destroyed) {
      myId = SC.genId()
      document.getElementById('myPeerId').textContent = '生成中...'
      initPeer(myId)
    }
    // 立即刷新文件列表（不等连接建立）
    renderShareFileList()
    // 显示文件选择区和当前文件分享按钮
    document.getElementById('shareFileSection').style.display = 'block'
    document.getElementById('shareCurrentSection').style.display = 'block'
    updateConnectedUsers()
  })

  // 关闭分享面板
  document.getElementById('shareClose').addEventListener('click', function() {
    document.getElementById('shareOverlay').classList.remove('show')
  })
  document.getElementById('shareOverlay').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('show')
  })

  // 复制房间号
  document.getElementById('copyPeerIdBtn').addEventListener('click', function() {
    if (!myId) return
    navigator.clipboard.writeText(myId).then(function() {
      showToast('房间号已复制', 'var(--green)')
    })
  })

  // 加入对方房间
  document.getElementById('joinRoomBtn').addEventListener('click', function() {
    var remoteId = document.getElementById('joinRoomInput').value.trim()
    if (!remoteId) { showShareStatus('请输入对方房间号', 'error'); return }
    if (conns[remoteId]) { showShareStatus('已经连接过此房间', 'info'); return }

    showShareStatus('正在连接 ' + remoteId + '...', 'info')
    var conn = myPeer.connect(remoteId, {reliable: true})

    conn.on('open', function() {
      conns[remoteId] = conn
      connAlive[remoteId] = Date.now()
      showShareStatus('🟢 已连接到 ' + remoteId, 'success')
      updateConnectedUsers()
      startHeartbeat()
    })
    conn.on('data', function(raw) { handleReceivedData(raw) })
    conn.on('close', function() {
      delete conns[remoteId]
      updateConnectedUsers()
      showToast(remoteId + ' 已断开', 'var(--orange)')
    })
    conn.on('error', function(err) {
      showShareStatus('❌ 连接失败: ' + err.type, 'error')
      delete conns[remoteId]
    })
  })

  // Enter 键连接
  document.getElementById('joinRoomInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('joinRoomBtn').click()
  })

  // 全选文件
  document.getElementById('selectAllFiles').addEventListener('click', function() {
    var cbs = document.querySelectorAll('.share-file-cb')
    var allChecked = Array.from(cbs).every(function(cb) { return cb.checked })
    cbs.forEach(function(cb) { cb.checked = !allChecked })
  })

  // 分享选中文件
  document.getElementById('shareSelectedBtn').addEventListener('click', function() {
    var files = getSelectedShareFiles()
    if (files.length === 0) { showToast('请至少选择一个文件', 'var(--orange)'); return }
    sendData({type: 'files', files: files, from: myId})
  })

  // 分享当前文件
  document.getElementById('shareCurrentBtn').addEventListener('click', function() {
    if (!state.currentFile || !state.currentFile.content) { showToast('请先打开一个文件', 'var(--orange)'); return }
    var file = state.currentFile
    sendData({type: 'file', file: {path: file.path, name: file.name, content: file.content}, from: myId})
  })

  // 给分享按钮添加涟漪
  document.getElementById('shareBtn').addEventListener('click', function(e) { addRipple(this, e) })

  // ═══ 历史面板 ═══
  var historyOverlay = document.getElementById('historyOverlay')
  var historyPanelContent = document.getElementById('historyPanelContent')

  function openHistoryPanel() {
    historyOverlay.classList.add('show')
    renderHistoryPanel()
  }

  function renderHistoryPanel() {
    if (typeof StorageCore === 'undefined') return
    StorageCore.loadFolders().then(function(folders) {
      if (folders.length === 0) {
        historyPanelContent.innerHTML = '<div style="text-align:center;color:var(--text-muted);font-size:13px;padding:32px 0">暂无历史记录</div>'
        return
      }
      folders.sort(function(a, b) { return (b.lastOpen || 0) - (a.lastOpen || 0) })
      var html = ''
      folders.forEach(function(f) {
        var date = new Date(f.lastOpen)
        var dateStr = date.getFullYear() + '/' + (date.getMonth()+1) + '/' + date.getDate() + ' ' + date.getHours() + ':' + String(date.getMinutes()).padStart(2,'0')
        html += '<div class="hp-item" data-id="' + f.id + '" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:6px;background:var(--bg-secondary);border:1px solid var(--border)">'
        html += '<span style="font-size:18px;flex-shrink:0">📁</span>'
        html += '<div style="flex:1;min-width:0">'
        html += '<div style="font-size:13px;font-weight:600;color:var(--text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escHtml(f.name) + '</div>'
        html += '<div style="font-size:11px;color:var(--text-muted)">' + (f.fileCount || f.files.length) + ' 个文件 · ' + dateStr + '</div>'
        html += '</div>'
        html += '<button class="hp-del" data-id="' + f.id + '" title="删除" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;padding:4px 8px;border-radius:4px;transition:all .15s;flex-shrink:0">✕</button>'
        html += '</div>'
      })
      html += '<div id="hpClearAll" style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:14px;padding:10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--red);background:var(--red-soft);border:1px dashed rgba(240,96,112,.3);transition:all .15s">🗑 清空全部</div>'
      historyPanelContent.innerHTML = html

      // 绑定点击加载
      historyPanelContent.querySelectorAll('.hp-item').forEach(function(el) {
        el.addEventListener('click', function(e) {
          if (e.target.classList.contains('hp-del')) return
          var id = this.getAttribute('data-id')
          StorageCore.loadFolders().then(function(folders) {
            var folder = folders.filter(function(f) { return f.id === id })[0]
            if (!folder) return
            state.files = folder.files
            state._folderId = folder.id
            state._folderName = folder.name
            folder.lastOpen = Date.now()
            StorageCore.saveFolder(folder)
            refreshTree()
            var firstMd = state.files.filter(function(f) { return f.type === 'md' })[0]
            if (firstMd) openFile(firstMd.path)
            saveState()
            historyOverlay.classList.remove('show')
            showToast('已加载: ' + folder.name, 'var(--accent)')
          })
        })
        el.addEventListener('mouseenter', function() { this.style.background = 'var(--accent-soft)' })
        el.addEventListener('mouseleave', function() { this.style.background = 'var(--bg-secondary)' })
      })

      // 绑定单条删除
      historyPanelContent.querySelectorAll('.hp-del').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation()
          var id = this.getAttribute('data-id')
          StorageCore.deleteFolder(id).then(function() {
            renderHistoryPanel()
            renderHistoryList()
            showToast('已删除', 'var(--text-muted)')
          })
        })
        btn.addEventListener('mouseenter', function() { this.style.color = 'var(--red)'; this.style.background = 'var(--red-soft)' })
        btn.addEventListener('mouseleave', function() { this.style.color = 'var(--text-muted)'; this.style.background = 'none' })
      })

      // 绑定清空全部
      var hpClear = document.getElementById('hpClearAll')
      if (hpClear) {
        hpClear.addEventListener('click', function() {
          showConfirm('确定清空所有历史记录？此操作不可撤销。', function() {
            clearAllStorage()
            historyOverlay.classList.remove('show')
          })
        })
        hpClear.addEventListener('mouseenter', function() { this.style.background = 'var(--red)'; this.style.color = '#fff' })
        hpClear.addEventListener('mouseleave', function() { this.style.background = 'var(--red-soft)'; this.style.color = 'var(--red)' })
      }
    })
  }

  document.getElementById('historyBtn').addEventListener('click', function() {
    openHistoryPanel()
  })
  document.getElementById('historyCloseBtn').addEventListener('click', function() {
    historyOverlay.classList.remove('show')
  })
  historyOverlay.addEventListener('click', function(e) {
    if (e.target === historyOverlay) historyOverlay.classList.remove('show')
  })
})()
</script>
</body>
</html>
